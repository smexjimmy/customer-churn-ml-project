version: "3.8"

# ============================================================
# Customer Churn MLOps — Docker Compose
# Services: postgres | minio | mlflow
# Phase 3 will add: api | prometheus | grafana
# ============================================================

services:

  # ── PostgreSQL: MLflow backend store ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: churn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO: S3-compatible artifact store ───────────────────
  minio:
    image: minio/minio:latest
    container_name: churn_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Init: create the mlflow-artifacts bucket ────────
  minio-init:
    image: minio/mc:latest
    container_name: churn_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 minioadmin minioadmin;
        mc mb minio/mlflow-artifacts --ignore-existing;
        echo 'Bucket ready.';
        exit 0;
      "

  # ── MLflow: experiment tracking server ────────────────────
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: churn_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"   # MLflow UI

  # ── API: FastAPI prediction service ───────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: churn_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/model.pkl
      - ENCODERS_PATH=models/label_encoders.pkl
      - SCALER_PATH=models/standard_scaler.pkl
    volumes:
      - ./data:/app/data

  # ── Prometheus: monitoring data scraper ───────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: churn_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - api

  # ── Grafana: visualization dashboard ──────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: churn_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
