name: CD — Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build API Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Pull model weights from DVC remote
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Once S3/MinIO DVC remote is set, configure credentials and pull:
          # dvc remote modify --local myremote access_key_id "$AWS_ACCESS_KEY_ID"
          # dvc remote modify --local myremote secret_access_key "$AWS_SECRET_ACCESS_KEY"
          # dvc pull
          echo "DVC pull environment ready. Set up cloud remote secrets to pull models on CD."

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/churn-prediction-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
